<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Student Result Search - Unique School System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Calibri, Arial, Helvetica, sans-serif;
        }

        body {
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }

        .search-container {
            width: 100%;
            max-width: 400px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            overflow: hidden;
        }

        .header {
            background: #1a3e6f;
            color: white;
            padding: 25px 15px;
            text-align: center;
        }

        .header h1 {
            font-size: 20px;
            margin-bottom: 6px;
            word-wrap: break-word;
        }

        .header h2 {
            font-size: 16px;
            font-weight: 400;
            opacity: 0.9;
        }

        .header p {
            font-size: 12px;
            margin-top: 10px;
            opacity: 0.8;
        }

        .search-box {
            padding: 25px 15px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 14px;
            font-size: 16px;
            /* Prevents iOS zoom */
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            transition: all 0.3s;
            -webkit-appearance: none;
        }

        .input-group input:focus {
            outline: none;
            border-color: #1a3e6f;
            box-shadow: 0 0 0 3px rgba(26, 62, 111, 0.1);
        }

        .search-btn {
            width: 100%;
            padding: 14px;
            background: #1a3e6f;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 10px;
        }

        /* Mobile specific adjustments */
        @media (max-width: 480px) {
            .search-container {
                max-width: 100%;
                border-radius: 12px;
            }

            .header {
                padding: 20px 10px;
            }

            .header h1 {
                font-size: 18px;
            }

            .header h2 {
                font-size: 14px;
            }
        }

        @media (max-width: 320px) {
            body {
                padding: 8px;
            }

            .header h1 {
                font-size: 16px;
            }

            .header h2 {
                font-size: 13px;
            }

            .header p {
                font-size: 10px;
            }

            .search-box {
                padding: 15px 10px;
            }

            .input-group label {
                font-size: 12px;
            }

            .search-btn {
                font-size: 14px;
                padding: 10px;
            }
        }

        .search-btn:active {
            background: #0e2a4a;
            transform: scale(0.98);
        }

        .search-btn:disabled {
            background: #999;
            cursor: not-allowed;
        }

        .footer-note {
            margin-top: 20px;
            text-align: center;
            font-size: 12px;
            color: #666;
        }

        .back-link {
            display: inline-block;
            margin-top: 15px;
            color: #1a3e6f;
            text-decoration: none;
            font-size: 14px;
        }

        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #1a3e6f;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .error-message {
            background: #fee;
            color: #c00;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            margin: 20px 0;
            display: none;
        }
    </style>
</head>

<body>
    <div class="search-container">
        <div class="header">
            <h1>UNIQUE SCHOOL SYSTEM</h1>
            <h2>Student Result Portal</h2>
            <p>Main Lehtrar Road, Punigran, Islamabad</p>
        </div>

        <div class="search-box">
            <div class="input-group">
                <label>Enter Roll Number / USIS ID</label>
                <input type="text" id="rollNumber" placeholder="e.g., 2024-001" autocomplete="off">
            </div>

            <button class="search-btn" id="searchBtn">
                <span>🔍</span> View Result
            </button>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Searching...</p>
            </div>

            <div class="error-message" id="error"></div>

            <a href="index.html" class="back-link">← Back to Admin Panel</a>
        </div>

        <div class="footer-note">
            Enter your roll number to view your progress report
        </div>
    </div>

    <script>
        const rollInput = document.getElementById('rollNumber');
        const searchBtn = document.getElementById('searchBtn');
        const loading = document.getElementById('loading');
        const error = document.getElementById('error');

        // Check for saved roll
        const urlParams = new URLSearchParams(window.location.search);
        const rollParam = urlParams.get('roll');
        if (rollParam) {
            rollInput.value = rollParam;
        }

        searchBtn.addEventListener('click', searchResult);
        rollInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchResult();
        });

        async function searchResult() {
            const roll = rollInput.value.trim();

            if (!roll) {
                showError('Please enter a roll number');
                return;
            }

            // Show loading
            loading.style.display = 'block';
            error.style.display = 'none';
            searchBtn.disabled = true;

            try {
                // First verify if student exists
                const response = await fetch(`/student/${encodeURIComponent(roll)}`);

                if (!response.ok) {
                    throw new Error('Student not found');
                }

                // Open result in new window
                const resultWindow = window.open(`result-display.html?roll=${encodeURIComponent(roll)}`, '_blank');

                if (!resultWindow) {
                    // Popup blocked - fallback to same window
                    window.location.href = `result-display.html?roll=${encodeURIComponent(roll)}`;
                }

                // Clear any errors
                hideError();

            } catch (err) {
                showError('Student not found. Please check your roll number.');
            } finally {
                loading.style.display = 'none';
                searchBtn.disabled = false;
            }
        }

        function showError(msg) {
            error.textContent = msg;
            error.style.display = 'block';
        }

        function hideError() {
            error.style.display = 'none';
        }
    </script>
</body>

</html>
